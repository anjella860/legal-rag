version: "3.8"
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: legal_rag_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5433:5432"]
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      retries: 5
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
  backend:
    build: ./backend
    ports: ["8001:8000"]
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/project02_db
      REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
    volumes: [./backend:/app]
volumes:
  postgres_data:
